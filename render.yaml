services:
  - type: web
    name: corrective-rag
    runtime: docker
    autoDeploy: true
    envVars:
      - key: GOOGLE_API_KEY
        sync: false
      - key: PINECONE_API_KEY
        sync: false
      - key: PINECONE_INDEX_NAME
        value: rag-index
      - key: PINECONE_CLOUD
        value: aws
      - key: PINECONE_REGION
        value: us-east-1
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: EMBEDDING_MODEL
        value: BAAI/bge-base-en-v1.5
      - key: EMBEDDING_DIMENSION
        value: "768"
      - key: RERANKER_MODEL
        value: cross-encoder/ms-marco-MiniLM-L-6-v2
      - key: MAX_RETRIES
        value: "2"
