<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Corrective RAG</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Corrective RAG</p>
          <h1>Document QA Console</h1>
        </div>
        <div id="status" class="status">Checking</div>
      </header>

      <section class="grid">
        <form id="ingestForm" class="panel">
          <div class="panel-title">
            <h2>Index PDF</h2>
            <span id="indexName" class="muted"></span>
          </div>

          <label>
            <span>PDF</span>
            <input id="pdfFile" name="file" type="file" accept="application/pdf" required />
          </label>

          <label>
            <span>Namespace</span>
            <input id="ingestNamespace" name="namespace" placeholder="default" />
          </label>

          <div class="two-col">
            <label>
              <span>Chunk size</span>
              <input id="chunkSize" name="chunk_size" type="number" min="200" max="2000" value="800" />
            </label>
            <label>
              <span>Overlap</span>
              <input id="chunkOverlap" name="chunk_overlap" type="number" min="0" max="500" value="100" />
            </label>
          </div>

          <button id="ingestButton" type="submit">Ingest PDF</button>
          <p id="ingestResult" class="result"></p>
        </form>

        <form id="queryForm" class="panel">
          <div class="panel-title">
            <h2>Ask</h2>
            <select id="mode" name="mode">
              <option value="advanced">Advanced CRAG</option>
              <option value="standard">Standard RAG</option>
            </select>
          </div>

          <label>
            <span>Namespace</span>
            <input id="queryNamespace" name="namespace" placeholder="default" />
          </label>

          <label>
            <span>Question</span>
            <textarea id="question" rows="7" placeholder="What does the document say about..." required></textarea>
          </label>

          <button id="askButton" type="submit">Ask</button>
        </form>
      </section>

      <section class="answer-band">
        <div class="answer-head">
          <h2>Answer</h2>
          <div id="meta" class="muted"></div>
        </div>
        <pre id="answer" class="answer">No answer yet.</pre>
        <div id="sources" class="sources"></div>
      </section>
    </main>
    <script src="/static/app.js"></script>
  </body>
</html>
